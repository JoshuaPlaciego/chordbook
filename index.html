<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Worship Chordbook v0.7 (awesome-2)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .chord-line { color: #fbbf24; font-weight: 700; font-family: monospace; }
        .num-line { color: #60a5fa; font-weight: 600; font-family: monospace; font-size: 0.9em; }
        .lyric-line { color: #f1f5f9; font-size: 1.15rem; }
        #navDrawer { transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .modal-transition { transition: opacity 0.25s ease, transform 0.25s ease; }
    </style>
</head>
<body class="bg-[#0f1117] text-gray-100 min-h-screen selection:bg-indigo-500/30 selection:text-white">

    <div id="navDrawer" class="fixed inset-y-0 left-0 w-72 bg-[#171921] border-r border-gray-800 z-[100] transform -translate-x-full shadow-2xl flex flex-col">
        <div class="p-6 flex-1 overflow-y-auto">
            <h2 class="text-indigo-400 font-bold text-[10px] uppercase tracking-widest mb-6">Library Menu</h2>
            <div class="grid grid-cols-3 gap-2 mb-6">
                <button onclick="setTab('songs')" id="tab-songs" class="text-[9px] font-bold py-2 bg-gray-800 rounded">SONGS</button>
                <button onclick="setTab('setlists')" id="tab-setlists" class="text-[9px] font-bold py-2 hover:bg-gray-800 rounded">SETS</button>
                <button onclick="setTab('favorites')" id="tab-favorites" class="text-[9px] font-bold py-2 hover:bg-gray-800 rounded">FAVS</button>
            </div>
            <input type="text" id="searchInput" oninput="renderList()" placeholder="Search..." class="w-full bg-gray-900 border border-gray-700 text-white p-3 rounded-lg text-sm mb-6 outline-none focus:border-indigo-500">
            <div class="flex items-center justify-between mb-2">
                <div class="text-[9px] text-gray-500 uppercase tracking-widest" id="listHeader">All Songs</div>
                <button onclick="toggleAdmin()" class="text-[9px] text-indigo-400 font-bold">Admin</button>
            </div>
            <div id="sideContent" class="space-y-1">Loading...</div>
            <button id="addBtn" onclick="openForm()" class="hidden w-full mt-4 py-2 bg-indigo-600 hover:bg-indigo-700 text-white text-xs font-bold rounded">ADD NEW SONG</button>
        </div>
    </div>
    
    <div id="overlay" onclick="toggleNav(false)" class="fixed inset-0 bg-black/60 z-[90] hidden"></div>

    <header class="sticky top-0 bg-[#0f1117]/95 backdrop-blur-md border-b border-gray-800 p-4 z-50 flex items-center gap-4">
        <button onclick="toggleNav(true)" class="p-2.5 hover:bg-gray-800 rounded-lg text-indigo-400 font-bold text-xs border border-gray-800">MENU</button>
        <h1 id="pageTitle" class="text-base font-bold">Chordbook</h1>
    </header>

    <main id="appView" class="max-w-xl mx-auto p-5 pb-32">
        <div class="text-center mt-20 text-gray-500">Select a song from the menu...</div>
    </main>

    <script>
        const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbyXCeXackc_suAUMKCGJ6qIjMygAADB9zHmoJ5EqWU_OTmBxkgH9uHLP4nY427farS5/exec';
        let songs = [], favorites = JSON.parse(localStorage.getItem('favs') || '[]');
        let currentTab = 'songs', currentSong = null, currentKey = '', displayMode = 'both', songLines = [];
        const NOTES = ['C', 'C#', 'D', 'D#', 'E', 'F', 'F#', 'G', 'G#', 'A', 'A#', 'B'];
        const SCALE_NUMBERS = ['1', '2', '2', '3', '3', '4', '4', '5', '6', '6', '7', '7'];

        async function initApp() {
            try {
                const res = await fetch(`${SCRIPT_URL}?tab=Songs`);
                songs = await res.json();
                renderList();
            } catch(e) { console.error(e); }
        }

        function renderList() {
            const container = document.getElementById('sideContent');
            const filtered = songs.filter(s => {
                const search = document.getElementById('searchInput').value.toLowerCase();
                const matchesSearch = s.Title.toLowerCase().includes(search);
                if (currentTab === 'favorites') return matchesSearch && favorites.includes(String(s.SongID));
                return matchesSearch;
            });
            container.innerHTML = filtered.map(s => `
                <div class="p-3 hover:bg-gray-800 rounded cursor-pointer text-sm" onclick="changeSong(${JSON.stringify(s).replace(/"/g, '&quot;')})">
                    ${s.Title}
                </div>`).join('');
        }

        async function changeSong(song) {
            currentSong = song;
            currentKey = song.OriginalKey;
            toggleNav(false);
            document.getElementById('pageTitle').innerText = song.Title;
            
            try {
                const res = await fetch(`${SCRIPT_URL}?tab=SongLines`);
                const allLines = await res.json();
                songLines = allLines.filter(line => String(line.SongID) === String(song.SongID));
                renderSong();
            } catch(e) { document.getElementById('appView').innerHTML = "Error loading content."; }
        }

        function transposeChord(chord, semitones) {
            return chord.replace(/[A-G](?:#|b)?/g, (match) => {
                let idx = NOTES.indexOf(match);
                return idx === -1 ? match : NOTES[(idx + semitones + 12) % 12];
            });
        }

        function getNumberForChord(chord) {
            const root = chord.match(/^[A-G](?:#|b)?/);
            if (!root) return chord;
            const rootIdx = NOTES.indexOf(root[0]);
            const keyIdx = NOTES.indexOf(currentKey);
            if (rootIdx === -1 || keyIdx === -1) return chord;
            return SCALE_NUMBERS[(rootIdx - keyIdx + 12) % 12];
        }

        function renderSong() {
            const semitones = NOTES.indexOf(currentKey) - NOTES.indexOf(currentSong.OriginalKey);
            const isFav = favorites.includes(String(currentSong.SongID));
            
            document.getElementById('appView').innerHTML = `
                <div class="p-6 bg-gray-900 rounded-2xl border border-gray-800">
                    <h2 class="text-3xl font-bold mb-1">${currentSong.Title}</h2>
                    <p class="text-xs text-gray-500 mb-4">ID: ${currentSong.SongID} | Ver: ${currentSong.Version || '1.0'}</p>
                    <div class="flex flex-wrap gap-2 mb-6">
                        <select onchange="currentKey=this.value; renderSong()" class="bg-gray-800 text-xs p-1 rounded border border-gray-700 text-amber-400">${NOTES.map(k => `<option ${k===currentKey?'selected':''}>${k}</option>`).join('')}</select>
                        <select onchange="displayMode=this.value; renderSong()" class="bg-gray-800 text-xs p-1 rounded border border-gray-700">
                            <option value="chords" ${displayMode==='chords'?'selected':''}>Chords</option>
                            <option value="numbers" ${displayMode==='numbers'?'selected':''}>Numbers</option>
                            <option value="both" ${displayMode==='both'?'selected':''}>Both</option>
                        </select>
                        <button onclick="toggleFav('${currentSong.SongID}')" class="px-3 py-1 rounded text-xs bg-gray-800 ${isFav?'text-indigo-400':'text-gray-400'}">${isFav?'★':'☆'}</button>
                    </div>
                    <div class="space-y-4">
                        ${songLines.map(l => {
                            const transposed = transposeChord(l.Chords || '', semitones);
                            return `
                                <div>
                                    ${(displayMode !== 'numbers') ? `<div class="chord-line">${transposed}</div>` : ''}
                                    ${(displayMode !== 'chords') ? `<div class="num-line">${getNumberForChord(transposed)}</div>` : ''}
                                    <div class="lyric-line">${l.Lyrics || ''}</div>
                                </div>`;
                        }).join('')}
                    </div>
                </div>`;
        }

        function toggleFav(id) {
            favorites = favorites.includes(String(id)) ? favorites.filter(f => f !== String(id)) : [...favorites, String(id)];
            localStorage.setItem('favs', JSON.stringify(favorites));
            renderSong();
        }

        function setTab(tab) { currentTab = tab; renderList(); }
        function toggleNav(show) { document.getElementById('navDrawer').classList.toggle('-translate-x-full', !show); document.getElementById('overlay').classList.toggle('hidden', !show); }
        function toggleAdmin() { document.getElementById('addBtn').classList.toggle('hidden'); }
        function openForm() { /* Implement modal logic as in inspiration */ }
        window.onload = initApp;
    </script>
</body>
</html>
