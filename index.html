<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Worship Chordbook v0.7 (awesome-2)</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
.chord-line { color: #fbbf24; font-weight: 700; font-family: monospace; }
.num-line { color: #60a5fa; font-weight: 600; font-family: monospace; font-size: 0.9em; }
.lyric-line { color: #f1f5f9; font-size: 1.15rem; }
#navDrawer { transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
</style>
</head>
<body class="bg-[#0f1117] text-gray-100 min-h-screen selection:bg-indigo-500/30 selection:text-white">

<div id="navDrawer" class="fixed inset-y-0 left-0 w-72 bg-[#171921] border-r border-gray-800 z-[100] transform -translate-x-full shadow-2xl flex flex-col">
<div class="p-6 flex-1 overflow-y-auto">
<h2 class="text-indigo-400 font-bold text-[10px] uppercase tracking-widest mb-6">Library Menu</h2>
<div class="grid grid-cols-3 gap-2 mb-6">
<button onclick="setTab('songs')" id="tab-songs" class="text-[9px] font-bold py-2 bg-gray-800 rounded">SONGS</button>
<button onclick="setTab('setlists')" id="tab-setlists" class="text-[9px] font-bold py-2 hover:bg-gray-800 rounded">SETS</button>
<button onclick="setTab('favorites')" id="tab-favorites" class="text-[9px] font-bold py-2 hover:bg-gray-800 rounded">FAVS</button>
</div>
<input type="text" id="searchInput" oninput="renderList()" placeholder="Search..." class="w-full bg-gray-900 border border-gray-700 text-white p-3 rounded-lg text-sm mb-6 outline-none focus:border-indigo-500">
<div class="flex items-center justify-between mb-2">
<div class="text-[9px] text-gray-500 uppercase tracking-widest" id="listHeader">All Songs</div>
<button onclick="toggleAdmin()" class="text-[9px] text-indigo-400 font-bold">Admin</button>
</div>
<div id="sideContent" class="space-y-1">Loading...</div>
<button id="addBtn" onclick="openForm()" class="hidden w-full mt-4 py-2 bg-indigo-600 hover:bg-indigo-700 text-white text-xs font-bold rounded">ADD NEW SONG</button>
</div>
</div>
<div id="overlay" onclick="toggleNav(false)" class="fixed inset-0 bg-black/60 z-[90] hidden"></div>

<div id="formModal" class="fixed inset-0 bg-black/80 z-[200] hidden flex items-center justify-center p-4 overflow-y-auto">
<div class="bg-gray-900 p-6 rounded-2xl w-full max-w-lg border border-gray-800 shadow-2xl my-10">
<h3 class="text-lg font-bold mb-4 text-white">Add New Song</h3>
<div class="space-y-3 mb-6 border-b border-gray-800 pb-6">
<input type="text" id="fTitle" placeholder="Song Title" class="w-full bg-gray-800 p-3 rounded-lg text-sm text-white border border-gray-700">
<input type="text" id="fArtist" placeholder="Artist" class="w-full bg-gray-800 p-3 rounded-lg text-sm text-white border border-gray-700">
<input type="text" id="fKey" placeholder="Original Key" class="w-full bg-gray-800 p-3 rounded-lg text-sm text-white border border-gray-700">
<input type="text" id="fVersion" placeholder="Version (e.g. 1.0)" class="w-full bg-gray-800 p-3 rounded-lg text-sm text-white border border-gray-700">
</div>
<div id="songSections" class="space-y-4 mb-6"></div>
<button onclick="addSection()" class="w-full mb-4 py-2 border border-dashed border-gray-700 text-gray-500 text-xs hover:border-indigo-500 hover:text-indigo-400">+ ADD SECTION</button>

<button onclick="submitForm()" class="w-full bg-indigo-600 py-3 rounded-xl font-bold hover:bg-indigo-700">SAVE SONG</button>
<button onclick="closeForm()" class="w-full mt-3 text-gray-400 text-xs hover:text-gray-200">Cancel</button>
</div>
</div>

<header class="sticky top-0 bg-[#0f1117]/95 backdrop-blur-md border-b border-gray-800 p-4 z-50 flex items-center gap-4">
<button onclick="toggleNav(true)" class="p-2.5 hover:bg-gray-800 rounded-lg text-indigo-400 font-bold text-xs border border-gray-800">MENU</button>
<h1 id="pageTitle" class="text-base font-bold">Chordbook</h1>
</header>

<main id="appView" class="max-w-xl mx-auto p-5 pb-32">
<div class="text-center mt-20 text-gray-500">Select a song from the menu...</div>
</main>

<script>
const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbyXCeXackc_suAUMKCGJ6qIjMygAADB9zHmoJ5EqWU_OTmBxkgH9uHLP4nY427farS5/exec';
let songs = [], favorites = JSON.parse(localStorage.getItem('favs') || '[]');
let currentTab = 'songs', currentSong = null, currentKey = '', displayMode = 'both', songLines = [];
const NOTES = ['C', 'C#', 'D', 'Eb', 'E', 'F', 'F#', 'G', 'Ab', 'A', 'Bb', 'B'];
const SCALE_NUMBERS = ['1', '2', '2', '3', '3', '4', '4', '5', '6', '6', '7', '7'];

const NOTE_TO_INDEX = {
'C': 0, 'C#': 1, 'Db': 1, 'D': 2, 'D#': 3, 'Eb': 3, 'E': 4,
'F': 5, 'F#': 6, 'Gb': 6, 'G': 7, 'G#': 8, 'Ab': 8, 'A': 9,
'A#': 10, 'Bb': 10, 'B': 11
};

function formatChordsInput(inputElement) {
    inputElement.value = inputElement.value.replace(/[^A-Ga-gm#bB\/0-9 -]/g, '');
}

function transposeNote(note, semitones) {
    const baseNote = note.replace(/[mb]/ig, '');
    const idx = NOTE_TO_INDEX[baseNote.toUpperCase()];
    if (idx === undefined) return note;
    const newIdx = (idx + semitones + 12) % 12;
    return NOTES[newIdx] + note.substring(baseNote.length);
}

function transposeChord(chord, semitones) {
    if (!chord) return '';
    return chord.split(' - ').map(part => {
        return part.split('/').map(sub => transposeNote(sub, semitones)).join('/');
    }).join(' - ');
}

function getNumberForChord(chord, rootKey) {
    if (!chord) return '';
    const keyIdx = NOTE_TO_INDEX[rootKey];
    return chord.split(' - ').map(part => {
        return part.split('/').map(sub => {
            const baseNote = sub.replace(/[mb]/ig, '');
            const idx = NOTE_TO_INDEX[baseNote.toUpperCase()];
            if (idx === undefined) return sub;
            const num = SCALE_NUMBERS[(idx - keyIdx + 12) % 12];
            return sub.replace(baseNote, num);
        }).join('/');
    }).join(' - ');
}

let sections = [];
function addSection() { sections.push({ name: '', lines: [{ chords: '', lyrics: '' }] }); renderFormSections(); }
function addLine(secIdx) { sections[secIdx].lines.push({ chords: '', lyrics: '' }); renderFormSections(); }
function renderFormSections() {
    const container = document.getElementById('songSections');
    container.innerHTML = sections.map((sec, sIdx) => `
        <div class="bg-gray-800 p-4 rounded-xl">
        <input type="text" placeholder="Section Name" class="w-full bg-gray-900 p-2 mb-2 rounded border border-gray-700 text-xs" value="${sec.name}" onchange="sections[${sIdx}].name=this.value">
        ${sec.lines.map((l, lIdx) => `
            <div class="flex gap-2 mb-1">
            <input type="text" class="w-1/3 bg-gray-900 p-2 rounded border border-gray-700 text-xs" value="${l.chords}" oninput="formatChordsInput(this)" onchange="sections[${sIdx}].lines[${lIdx}].chords=this.value">
            <input type="text" class="w-2/3 bg-gray-900 p-2 rounded border border-gray-700 text-xs" value="${l.lyrics}" onchange="sections[${sIdx}].lines[${lIdx}].lyrics=this.value">
            </div>
        `).join('')}
        <button onclick="addLine(${sIdx})" class="text-[10px] text-indigo-400 mt-2 font-bold">+ Add Line</button>
        </div>
    `).join('');
}

async function initApp() {
    try {
        const res = await fetch(`${SCRIPT_URL}?tab=Songs`);
        songs = await res.json();
        renderList();
    } catch(e) { console.error(e); }
}

function renderList() {
    const container = document.getElementById('sideContent');
    const search = document.getElementById('searchInput').value.toLowerCase();
    const filtered = songs.filter(s => {
        const matchesSearch = s.Title && s.Title.toLowerCase().includes(search);
        if (currentTab === 'favorites') return matchesSearch && favorites.includes(String(s.SongID));
        return matchesSearch;
    });
    container.innerHTML = filtered.length > 0 ? filtered.map(s => `
        <div class="p-3 hover:bg-gray-800 rounded cursor-pointer text-sm" onclick="changeSong(${JSON.stringify(s).replace(/"/g, '&quot;')})">
        ${s.Title}
        </div>`).join('') : '<div class="p-3 text-xs text-gray-600">No songs found...</div>';
}

async function changeSong(song) {
    currentSong = song;
    currentKey = song.OriginalKey;
    toggleNav(false);
    document.getElementById('pageTitle').innerText = song.Title;
    try {
        const res = await fetch(`${SCRIPT_URL}?tab=SongLines`);
        const allLines = await res.json();
        songLines = allLines.filter(line => String(line.SongID) === String(song.SongID));
        renderSong();
    } catch(e) { document.getElementById('appView').innerHTML = "Error loading content."; }
}

function renderSong() {
    const semitones = NOTE_TO_INDEX[currentKey] - NOTE_TO_INDEX[currentSong.OriginalKey];
    const isFav = favorites.includes(String(currentSong.SongID));
    
    document.getElementById('appView').innerHTML = `
    <div class="p-6 bg-gray-900 rounded-2xl border border-gray-800">
        <h2 class="text-3xl font-bold mb-1">${currentSong.Title}</h2>
        <p class="text-sm text-indigo-400 mb-1 font-medium">${currentSong.Artist || 'Unknown Artist'}</p>
        
        <!-- Toolbar for Transposition -->
        <div class="flex flex-wrap gap-2 mb-6 mt-4 items-center p-3 bg-gray-800/50 rounded-xl border border-gray-800">
            <span class="text-xs text-gray-400 font-bold uppercase tracking-wider mr-2">Key:</span>
            <select onchange="currentKey=this.value; renderSong()" class="bg-gray-900 text-sm p-1.5 rounded border border-gray-700 text-amber-400 font-bold w-20">
                ${NOTES.map(k => `<option ${k===currentKey?'selected':''}>${k}</option>`).join('')}
            </select>
            <span class="text-xs text-gray-400 font-bold uppercase tracking-wider ml-4 mr-2">View:</span>
            <select onchange="displayMode=this.value; renderSong()" class="bg-gray-900 text-sm p-1.5 rounded border border-gray-700 text-white w-24">
                <option value="both" ${displayMode==='both'?'selected':''}>Both</option>
                <option value="chords" ${displayMode==='chords'?'selected':''}>Chords</option>
                <option value="numbers" ${displayMode==='numbers'?'selected':''}>Numbers</option>
            </select>
            <button onclick="toggleFav('${currentSong.SongID}')" class="ml-auto px-4 py-1.5 rounded text-sm font-bold border border-gray-700 ${isFav?'text-indigo-400 border-indigo-500/30 bg-indigo-500/10':'text-gray-400'}">${isFav?'★ Favorited':'☆ Favorite'}</button>
        </div>

        <div class="space-y-4">
            ${songLines.map(l => {
                const transposed = transposeChord(l.Chords || '', semitones);
                const numbers = getNumberForChord(transposed, currentKey);
                return `
                <div class="mb-4">
                    ${(displayMode !== 'numbers') ? `<div class="chord-line">${transposed}</div>` : ''}
                    ${(displayMode !== 'chords') ? `<div class="num-line">${numbers}</div>` : ''}
                    <div class="lyric-line">${l.Lyrics || ''}</div>
                </div>`;
            }).join('')}
        </div>
    </div>`;
}

function toggleFav(id) {
    favorites = favorites.includes(String(id)) ? favorites.filter(f => f !== String(id)) : [...favorites, String(id)];
    localStorage.setItem('favs', JSON.stringify(favorites));
    renderSong();
}

function openForm() { document.getElementById('formModal').classList.remove('hidden'); }
function closeForm() { document.getElementById('formModal').classList.add('hidden'); }
async function submitForm() {
    const payload = {
        secret: "YOUR_SECRET_KEY",
        action: "bulkAdd",
        song: {
            title: document.getElementById('fTitle').value,
            artist: document.getElementById('fArtist').value,
            key: document.getElementById('fKey').value,
            version: document.getElementById('fVersion').value || "1.0"
        },
        lines: sections.flatMap((sec, sIdx) => sec.lines.map((l, lIdx) => ({
            section: sec.name,
            order: lIdx + 1,
            chords: l.chords,
            lyrics: l.lyrics
        })))
    };
    try {
        const res = await fetch(SCRIPT_URL, { method: 'POST', body: JSON.stringify(payload) });
        alert("Song submitted successfully!");
        closeForm();
        initApp();
    } catch(e) { alert("Error submitting song"); }
}

function setTab(tab) { currentTab = tab; renderList(); }
function toggleNav(show) { document.getElementById('navDrawer').classList.toggle('-translate-x-full', !show); document.getElementById('overlay').classList.toggle('hidden', !show); }
function toggleAdmin() { document.getElementById('addBtn').classList.toggle('hidden'); }
window.onload = initApp;
</script>
</body>
</html>
