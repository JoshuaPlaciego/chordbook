<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Worship Chordbook v0.5</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .chord-line { color: #fbbf24; font-weight: 700; font-family: monospace; }
        .lyric-line { color: #f1f5f9; font-size: 1.15rem; }
        #navDrawer { transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
    </style>
</head>
<body class="bg-[#0f1117] text-gray-100 min-h-screen selection:bg-indigo-500/30 selection:text-white">

    <div id="navDrawer" class="fixed inset-y-0 left-0 w-72 bg-[#171921] border-r border-gray-800 z-[100] transform -translate-x-full shadow-2xl flex flex-col">
        <div class="p-6 flex-1 overflow-y-auto">
            <h2 class="text-indigo-400 font-bold text-[10px] uppercase tracking-widest mb-6">Library Menu</h2>
            <input type="text" id="searchInput" oninput="renderList()" placeholder="Search library..." class="w-full bg-gray-900 border border-gray-700 text-white p-3 rounded-lg text-sm mb-6 outline-none focus:border-indigo-500 transition-colors">
            <div id="sideContent" class="space-y-1">Loading...</div>
        </div>
    </div>
    
    <div id="overlay" onclick="toggleNav(false)" class="fixed inset-0 bg-black/60 z-[90] hidden transition-opacity duration-300"></div>
    
    <header class="sticky top-0 bg-[#0f1117]/95 backdrop-blur-md border-b border-gray-800 p-4 z-50 flex items-center gap-4">
        <button onclick="toggleNav(true)" class="p-2.5 hover:bg-gray-800/80 rounded-lg text-indigo-400 border border-gray-800"><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path></svg></button>
        <div class="flex flex-col min-w-0"><h1 id="pageTitle" class="text-base font-bold truncate">Chordbook</h1></div>
    </header>

    <main id="appView" class="max-w-xl mx-auto p-5 pb-32">
        <div class="text-center mt-20 text-gray-500">Loading library...</div>
    </main>

    <script>
        const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbyXCeXackc_suAUMKCGJ6qIjMygAADB9zHmoJ5EqWU_OTmBxkgH9uHLP4nY427farS5/exec';
        let songs = [], favorites = JSON.parse(localStorage.getItem('favs') || '[]');
        let currentSong = null;
        
        async function fetchTab(tabName) { try { const res = await fetch(`${SCRIPT_URL}?tab=${tabName}`); return await res.json(); } catch(e) { return []; } }
        
        async function initApp() { 
            songs = await fetchTab('Songs');
            renderList();
        }

        function renderList() {
            const container = document.getElementById('sideContent');
            container.innerHTML = songs.map(s => `<button class="block w-full text-left p-3 text-sm text-gray-300 hover:bg-gray-800 rounded-lg truncate" onclick='changeSong(${JSON.stringify(s)})'>${s.Title}</button>`).join('');
        }

        function toggleNav(show) { document.getElementById('navDrawer').classList.toggle('-translate-x-full', !show); document.getElementById('overlay').classList.toggle('hidden', !show); }

        function toggleFav(id) {
            id = String(id);
            if (favorites.includes(id)) favorites = favorites.filter(f => f !== id);
            else favorites.push(id);
            localStorage.setItem('favs', JSON.stringify(favorites));
            changeSong(currentSong);
        }

        async function changeSong(song) {
            currentSong = song;
            document.getElementById('pageTitle').innerText = song.Title;
            toggleNav(false);
            const allLines = await fetchTab('SongLines');
            const songLines = allLines
                .filter(line => line.SongID == song.SongID)
                .sort((a, b) => (parseInt(a.LineOrder) || 0) - (parseInt(b.LineOrder) || 0));
                
            const grouped = songLines.reduce((acc, line) => {
                const section = line.SectionName || "Lyrics";
                if (!acc[section]) acc[section] = [];
                acc[section].push(line);
                return acc;
            }, {});
            
            const isFav = favorites.includes(String(song.SongID));

            document.getElementById('appView').innerHTML = `
                <div class="p-6 bg-gray-900 rounded-2xl border border-gray-800">
                    <h2 class="text-3xl font-bold mb-2">${song.Title}</h2>
                    <div class="flex flex-wrap gap-2 mb-6 text-xs">
                        <span class="bg-gray-800 px-3 py-1 rounded-full text-gray-300">${song.Artist || 'No Artist'}</span>
                        <span class="bg-gray-800 px-3 py-1 rounded-full text-amber-400">Key: ${song.OriginalKey || 'N/A'}</span>
                        <button onclick="toggleFav(${song.SongID})" class="px-3 py-1 rounded-full transition-all ${isFav ? 'bg-indigo-600/20 text-indigo-400' : 'bg-gray-800 text-gray-400'}">${isFav ? '★ Favorited' : '☆ Favorite'}</button>
                    </div>
                    <div id="sectionsContainer" class="space-y-4">
                        ${Object.entries(grouped).map(([name, lines]) => `
                            <div class="bg-white/5 backdrop-blur-lg border border-white/10 rounded-xl overflow-hidden">
                                <button onclick="this.nextElementSibling.classList.toggle('hidden')" class="w-full text-left p-4 font-bold text-indigo-400 uppercase tracking-widest text-[10px] flex justify-between">
                                    ${name} <span>▾</span>
                                </button>
                                <div class="p-4 pt-0">
                                    ${lines.map(l => `
                                        <div class="mb-2">
                                            <div class="chord-line">${l.Chords || l.Type || ''}</div>
                                            <div class="lyric-line">${l.Lyrics || Object.values(l)[4] || ''}</div>
                                        </div>
                                    `).join('')}
                                </div>
                            </div>
                        `).join('')}
                    </div>
                </div>
            `;
        }

        window.onload = initApp;
    </script>
</body>
</html>
