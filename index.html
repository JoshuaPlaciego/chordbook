<style>
/* Micro-interactivity & Animations */
@keyframes meshGradient {
    0% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
}
body {
    background-size: 200% 200%;
    animation: meshGradient 20s ease infinite;
}
.chord-line { 
    color: #fbbf24; 
    font-weight: 700; 
    font-family: monospace; 
    transition: font-size 0.2s ease, transform 0.2s ease;
}
.num-line { 
    color: #60a5fa; 
    font-weight: 600; 
    font-family: monospace; 
    font-size: 0.9em; 
    transition: font-size 0.2s ease;
}
.lyric-line { 
    color: #f1f5f9; 
    font-size: 1rem; 
    transition: font-size 0.2s ease;
}
#navDrawer { 
    transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1); 
}

/* Custom Scrollbar for a cleaner look */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 10px; }
::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.2); }

/* Animated details chevron */
details summary span {
    transition: transform 0.2s ease;
}
details[open] summary span {
    transform: rotate(180deg);
}

/* Modal animation state engine */
.modal-overlay {
    transition: opacity 0.3s ease, visibility 0.3s ease;
}
.modal-content {
    transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1), opacity 0.3s ease;
}
.modal-hidden {
    opacity: 0;
    visibility: hidden;
    pointer-events: none;
}
.modal-hidden .modal-content {
    transform: scale(0.9) translateY(10px);
    opacity: 0;
}
</style>
</head>

<script>
const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbyXCeXackc_suAUMKCGJ6qIjMygAADB9zHmoJ5EqWU_OTmBxkgH9uHLP4nY427farS5/exec';
let songs = [], favorites = JSON.parse(localStorage.getItem('favs') || '[]');
let currentTab = 'songs', currentSong = null, currentKey = '', displayMode = 'both', songLines = [];
let lyricZoom = 1.0;
let scrollInterval = null;
let scrollSpeed = 1; // Pixels per step

const NOTES = ['C', 'C#', 'D', 'Eb', 'E', 'F', 'F#', 'G', 'Ab', 'A', 'Bb', 'B'];
const SCALE_NUMBERS = ['1', '2', '2', '3', '3', '4', '4', '5', '6', '6', '7', '7'];

const NOTE_TO_INDEX = {
'C': 0, 'B#': 0, 'C#': 1, 'Db': 1, 'D': 2, 'D#': 3, 'Eb': 3, 'E': 4, 'Fb': 4,
'F': 5, 'E#': 5, 'F#': 6, 'Gb': 6, 'G': 7, 'G#': 8, 'Ab': 8, 'A': 9,
'A#': 10, 'Bb': 10, 'B': 11, 'Cb': 11
};

// Loading helper functions
function showLoading() { 
    document.getElementById('loadingOverlay').classList.remove('hidden'); 
    document.getElementById('loadingOverlay').classList.add('flex'); 
}
function hideLoading() { 
    document.getElementById('loadingOverlay').classList.add('hidden'); 
    document.getElementById('loadingOverlay').classList.remove('flex'); 
}

// Reusable logic to calculate and render Family Chords based on key
function getFamilyChordsHTML(keyStr) {
    if (!keyStr) return '';
    const idx = NOTE_TO_INDEX[keyStr];
    if (idx === undefined) return '';

    const intervals = [0, 2, 4, 5, 7, 9, 11];
    const qualities = ['', 'm', 'm', '', '', 'm', 'dim'];
    const degrees = ['1', '2', '3', '4', '5', '6', '7'];
    
    // Smart spelling: Use sharps for sharp keys, flats for flat keys
    const useSharps = ['G', 'D', 'A', 'E', 'B', 'F#', 'C#'].includes(keyStr);
    const scaleNotes = useSharps 
        ? ['C', 'C#', 'D', 'D#', 'E', 'F', 'F#', 'G', 'G#', 'A', 'A#', 'B'] 
        : ['C', 'Db', 'D', 'Eb', 'E', 'F', 'Gb', 'G', 'Ab', 'A', 'Bb', 'B'];

    let familyHTML = '<div class="text-[10px] text-indigo-300 mt-2 font-mono flex flex-wrap gap-2 items-center"><span class="text-gray-500 mr-1 uppercase tracking-widest">Family Chords:</span>';
    for (let i=0; i<7; i++) {
        const noteIdx = (idx + intervals[i]) % 12;
        familyHTML += `<span class="bg-indigo-500/10 border border-white/5 backdrop-blur-sm px-2 py-1 rounded-lg text-indigo-100 shadow-sm transition-all hover:bg-indigo-500/20"><b>${degrees[i]}</b>: ${scaleNotes[noteIdx]}${qualities[i]}</span>`;
    }
    familyHTML += '</div>';
    return familyHTML;
}

// Dynamically generate and display the correct family chords for the entered key
function updateKeyFamily(input) {
    let keyStr = input.value.trim();
    if (keyStr.length > 0) {
        keyStr = keyStr.charAt(0).toUpperCase() + keyStr.slice(1).toLowerCase();
    }
    
    const display = document.getElementById('keyFamilyDisplay');
    const html = getFamilyChordsHTML(keyStr);
    
    if (html) {
        display.innerHTML = html;
        display.classList.remove('hidden');
    } else {
        display.classList.add('hidden');
    }
}

// Helper to restrict and format chords
function formatChordsInput(inputElement, isFinal = false) {
let val = inputElement.value;
// Allow only letters A-G, m (minor), b (flat), numbers, d, i (for dim), #, /, spaces, and dashes
val = val.replace(/[^A-Ga-gmMbB#\/0-9diDI -]/g, '');

// Auto-format capitalization: root notes uppercase, 'm' and 'b' lowercase
val = val.toUpperCase();
val = val.replace(/M/g, 'm'); // Make all M's lowercase for minor chords
val = val.replace(/([A-G])B/g, '$1b'); // Make B lowercase only if it's a flat modifier after a root note
val = val.replace(/DIM/g, 'dim'); // Format 'dim'

// Diatonic Auto-Correct based on selected Key
const keyInput = document.getElementById('fKey');
if (keyInput && keyInput.value) {
    const keyStr = keyInput.value;
    const keyIdx = NOTE_TO_INDEX[keyStr];
    if (keyIdx !== undefined) {
        const intervals = [0, 2, 4, 5, 7, 9, 11];
        const qualities = ['', 'm', 'm', '', '', 'm', 'dim'];
        
        // Smart spelling: Use sharps for sharp keys, flats for flat keys
        const useSharps = ['G', 'D', 'A', 'E', 'B', 'F#', 'C#'].includes(keyStr);
        const scaleNotes = useSharps 
            ? ['C', 'C#', 'D', 'D#', 'E', 'F', 'F#', 'G', 'G#', 'A', 'A#', 'B'] 
            : ['C', 'Db', 'D', 'Eb', 'E', 'F', 'Gb', 'G', 'Ab', 'A', 'Bb', 'B'];

        // 1) NUMBER SHORTCUTS: 1-7 converts to exact Family Chords (Strong Correction)
        val = val.replace(/(^|[\s/|-])([1-7])(?=[\s/|-]|$)/g, (match, prefix, num) => {
            const degreeIdx = parseInt(num) - 1;
            const noteIdx = (keyIdx + intervals[degreeIdx]) % 12;
            const quality = prefix === '/' ? '' : qualities[degreeIdx];
            return prefix + scaleNotes[noteIdx] + quality;
        });

        // 2) STRICT DIATONIC AUTO-CORRECT: Appends OR removes 'm'/'dim' to perfectly match the family chords!
        const replacerLogic = (match, prefix, root, quality) => {
            if (prefix === '/') return match; // DO NOT modify bass notes!
            
            const rootIdx = NOTE_TO_INDEX[root];
            if (rootIdx !== undefined) {
                const distance = (rootIdx - keyIdx + 12) % 12;
                if (distance === 0 || distance === 5 || distance === 7) {
                    return prefix + root; // 1, 4, 5 are Major (Strips accidental 'm' or 'dim')
                } else if (distance === 2 || distance === 4 || distance === 9) {
                    return prefix + root + 'm'; // 2, 3, 6 are Minor
                } else if (distance === 11) {
                    return prefix + root + 'dim'; // 7 is Diminished
                }
            }
            return match;
        };

        if (isFinal) {
            val = val.replace(/(^|[\s/|-])([A-G][#b]?)(m|dim)?(?=[\s/|-]|$)/g, replacerLogic);
        } else {
            val = val.replace(/(^|[\s/|-])([A-G][#b]?)(m|dim)?(?=[\s/|-])/g, replacerLogic);
        }
    }
}

// Replace spaces/dashes between chords with a single ' - '
val = val.replace(/[\s-]+(?=[^\s-])/g, ' - ');
val = val.replace(/[\s-]+$/, ' ');

if (isFinal) {
    val = val.trim();
}

inputElement.value = val;
}

let sections = [];
function addSection() {
sections.push({ name: '', lines: [{ chords: '', lyrics: '' }] });
renderFormSections();
}
function addLine(secIdx) {
sections[secIdx].lines.push({ chords: '', lyrics: '' });
renderFormSections();
}
function renderFormSections() {
const container = document.getElementById('songSections');
container.innerHTML = sections.map((sec, sIdx) => `
<div class="bg-black/30 backdrop-blur-sm p-4 md:p-5 rounded-3xl shadow-inner border border-white/5 mb-4">
<input type="text" placeholder="Section Name (e.g. Chorus)" class="w-full bg-black/40 p-2.5 mb-2 rounded-xl outline-none focus:ring-1 focus:ring-indigo-500/30 text-sm text-white shadow-inner border border-white/5 transition-colors" value="${sec.name}" onchange="sections[${sIdx}].name=this.value">
<p class="text-[10px] text-indigo-300/70 mb-3 italic">Note: Press space after each chord. Tip: Type numbers (1-7) to instantly generate perfect family chords!</p>
${sec.lines.map((l, lIdx) => `
<div class="flex flex-col gap-1.5 mb-2.5 bg-white/5 p-2.5 rounded-2xl border border-white/5 shadow-sm">
<input type="text" placeholder="Chords (e.g. A B)" class="w-full bg-black/40 p-2.5 rounded-xl outline-none focus:ring-1 focus:ring-amber-500/30 text-xs text-amber-400 font-mono shadow-inner border border-white/5 transition-colors" value="${l.chords}" oninput="formatChordsInput(this)" onchange="formatChordsInput(this, true); sections[${sIdx}].lines[${lIdx}].chords=this.value">
<input type="text" placeholder="Lyrics" class="w-full bg-black/40 p-2.5 rounded-xl outline-none focus:ring-1 focus:ring-indigo-500/30 text-xs text-gray-200 shadow-inner border border-white/5 transition-colors" value="${l.lyrics}" onchange="sections[${sIdx}].lines[${lIdx}].lyrics=this.value">
</div>
`).join('')}
<button onclick="addLine(${sIdx})" class="text-[10px] bg-white/5 hover:bg-white/10 px-3 py-2 rounded-lg text-indigo-300 mt-1 font-bold transition-all active:scale-95 border border-white/5">+ Add Line</button>
</div>
`).join('');
}

async function initApp() {
showLoading();
try {
const res = await fetch(`${SCRIPT_URL}?tab=Songs`);
songs = await res.json();
renderList();
} catch(e) { console.error(e); }
finally { hideLoading(); }
}

function renderList() {
const container = document.getElementById('sideContent');
const search = document.getElementById('searchInput').value.toLowerCase();
const filtered = songs.filter(s => {
const matchesSearch = s.Title && s.Title.toLowerCase().includes(search);
if (currentTab === 'favorites') return matchesSearch && favorites.includes(String(s.SongID));
return matchesSearch;
});

// Sort alphabetical
filtered.sort((a, b) => (a.Title || '').localeCompare(b.Title || ''));

let currentLetter = '';
let listHTML = '';

if (filtered.length > 0) {
    filtered.forEach(s => {
        const title = s.Title || '';
        const firstChar = title.trim().charAt(0).toUpperCase();
        const displayLetter = (firstChar >= 'A' && firstChar <= 'Z') ? firstChar : '#';
        const isSelected = currentSong && String(s.SongID) === String(currentSong.SongID);
        
        if (displayLetter !== currentLetter) {
            currentLetter = displayLetter;
            listHTML += `
            <div class="flex items-center gap-2 pt-3 pb-1 px-3 select-none">
                <span class="uppercase font-bold bg-indigo-500/10 border border-indigo-500/20 text-[9px] text-indigo-300 w-5 h-5 rounded-md flex items-center justify-center shadow-inner font-mono">${currentLetter}</span>
                <div class="flex-1 h-[1px] bg-gradient-to-r from-indigo-500/20 via-indigo-500/5 to-transparent"></div>
            </div>`;
        }
        
        listHTML += `
        <div class="py-2.5 px-3 mb-0.5 rounded-xl cursor-pointer transition-all flex items-center justify-between group ${isSelected ? 'bg-indigo-600/20 border-l-2 border-indigo-500 shadow-inner' : 'hover:bg-white/5'}" onclick="changeSong(${JSON.stringify(s).replace(/"/g, '&quot;')})">
            <div>
                <div class="text-sm font-medium ${isSelected ? 'text-indigo-200' : 'text-gray-100 group-hover:text-white'} transition-colors">${s.Title}</div>
                <div class="text-[10px] text-gray-500 group-hover:text-gray-400 transition-colors">${s.Artist || 'Unknown Artist'} &bull; ID: ${s.SongID}</div>
            </div>
            ${favorites.includes(String(s.SongID)) ? `<span class="text-xs text-indigo-400">★</span>` : ''}

const CHORD_REGEX = /(^|[\s/()|-])([A-G][#b]?)/gi;

function transposeChord(chord, semitones) {
if (!chord) return '';
return chord.replace(CHORD_REGEX, (match, prefix, root) => {
const formattedRoot = root.charAt(0).toUpperCase() + root.slice(1).toLowerCase();
const idx = NOTE_TO_INDEX[formattedRoot];
if (idx === undefined) return match;
const newIdx = (idx + semitones + 12) % 12;
return prefix + NOTES[newIdx];
});
}

function getNumberForChord(chord) {
if (!chord) return '';
const keyIdx = NOTE_TO_INDEX[currentKey];
if (keyIdx === undefined) return chord;
return chord.replace(CHORD_REGEX, (match, prefix, root) => {
const formattedRoot = root.charAt(0).toUpperCase() + root.slice(1).toLowerCase();
const rootIdx = NOTE_TO_INDEX[formattedRoot];
if (rootIdx === undefined) return match;
const num = SCALE_NUMBERS[(rootIdx - keyIdx + 12) % 12];
return prefix + num;
});
}

function renderSong() {

        currentSectionObj = { name: secName, lines: [] };
        groupedSections.push(currentSectionObj);
    }
    currentSectionObj.lines.push(l);
});

// Zoom helper
function adjustZoom(amount) {
    lyricZoom = Math.max(0.75, Math.min(1.5, lyricZoom + amount));
    document.querySelectorAll('.lyric-line').forEach(el => el.style.fontSize = `${lyricZoom}rem`);
    document.querySelectorAll('.chord-line').forEach(el => el.style.fontSize = `${lyricZoom * 1.05}rem`);
    document.querySelectorAll('.num-line').forEach(el => el.style.fontSize = `${lyricZoom * 0.9}rem`);
}

// Quick transpose helper
function shiftKey(direction) {
    const currentIdx = NOTES.indexOf(currentKey);
    if (currentIdx === -1) return;
    const newIdx = (currentIdx + direction + 12) % 12;
    currentKey = NOTES[newIdx];
    renderSong();
}

// Auto scroll controller
function toggleAutoScroll() {
    const container = document.querySelector('.song-scroll-container');
    const text = document.getElementById('scrollBtnText');
    const icon = document.getElementById('scrollIcon');
    const btn = document.getElementById('autoScrollBtn');

    if (scrollInterval) {
        clearInterval(scrollInterval);
        scrollInterval = null;
        text.innerText = "Auto Scroll";
        btn.classList.remove('bg-emerald-500/20', 'text-emerald-300');
        btn.classList.add('bg-indigo-500/20', 'text-indigo-300');
        icon.innerHTML = `<path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zM9.555 7.168A1 1 0 008 8v4a1 1 0 001.555.832l3-2a1 1 0 000-1.664l-3-2z" clip-rule="evenodd"></path>`;
    } else {
        btn.classList.remove('bg-indigo-500/20', 'text-indigo-300');
        btn.classList.add('bg-emerald-500/20', 'text-emerald-300');
        text.innerText = "Playing";
        icon.innerHTML = `<path fill-rule="evenodd" d="M18 10a8 8 0 11-16 0 8 8 0 0116 0zM7 8a1 1 0 012 0v4a1 1 0 11-2 0V8zm5-1a1 1 0 00-1 1v4a1 1 0 102 0V8a1 1 0 00-1-1z" clip-rule="evenodd"></path>`;
        
        scrollInterval = setInterval(() => {
            if (container) {
                container.scrollTop += (scrollSpeed / 5); // smooth slow micro-steps
                if (container.scrollTop >= (container.scrollHeight - container.clientHeight)) {
                    toggleAutoScroll(); // stop at bottom
                }
            }
        }, 30);
    }
}

function adjustScrollSpeed(val) {
    scrollSpeed = parseInt(val);
}

async function verifyAdmin() {
    const user = document.getElementById('adminUser').value.trim();
    const pass = document.getElementById('adminPassword').value.trim();
    
    if (!user || !pass) {
        alert("Please enter both Username and Passkey.");
        return;
    }

    showLoading();
    try {
        const payload = { action: "verifyAdmin", user: user, passkey: pass };
        const res = await fetch(SCRIPT_URL, { method: 'POST', body: JSON.stringify(payload) });
        const result = await res.json();
        
        if (result.success) { 
            appUser = user;
            appSecret = pass; 
            updateAdminUI();
            closeAdminModal();
        } else {
            alert("Incorrect Username or Passkey!");
        }
    } catch(e) {
        console.error(e);
        alert("Error contacting server. Make sure your Apps Script handles the 'verifyAdmin' action.");
    } finally {
        hideLoading();
    }
}

function closeForm() { document.getElementById('formModal').classList.add('modal-hidden'); }

function editSong(songId) {
    editingSongId = songId;
    document.getElementById('formTitle').innerText = "Edit Song";
    document.getElementById('fTitle').value = currentSong.Title || '';
    document.getElementById('fArtist').value = currentSong.Artist || '';
    document.getElementById('fKey').value = currentSong.OriginalKey || '';
    document.getElementById('fVersion').value = currentSong.Version || '1.0';
    
    updateKeyFamily(document.getElementById('fKey'));

    sections = [];
    let currentSecObj = null;
    songLines.forEach(l => {
        const secName = l.SectionName || l.Section || l.section || 'Section';
        if (!currentSecObj || currentSecObj.name !== secName) {
            currentSecObj = { name: secName, lines: [] };
            sections.push(currentSecObj);
        }
        currentSecObj.lines.push({ chords: l.Chords || '', lyrics: l.Lyrics || '' });
    });

    if (sections.length === 0) {
        sections = [{ name: '', lines: [{ chords: '', lyrics: '' }] }];
    }

    renderFormSections();
    document.getElementById('formModal').classList.remove('modal-hidden');
}

async function submitForm() {
    const payload = {
        user: appUser,
        secret: appSecret,
        action: editingSongId ? "updateSong" : "bulkAdd",
        song: {
            id: editingSongId,
            title: document.getElementById('fTitle').value,
            artist: document.getElementById('fArtist').value,
            key: document.getElementById('fKey').value,
            version: document.getElementById('fVersion').value || "1.0"
        },
        lines: sections.flatMap((sec, sIdx) => sec.lines.map((l, lIdx) => ({
            section: sec.name,
            order: lIdx + 1,
            chords: l.chords,
            lyrics: l.lyrics
        })))
    };
    showLoading();
    try {
        const res = await fetch(SCRIPT_URL, { method: 'POST', body: JSON.stringify(payload) });
        const result = await res.json();
        if (result.status === "success") {
            alert(editingSongId ? "Song updated successfully!" : "Song submitted successfully!");
            closeForm();
            await initApp();
            
            if (editingSongId && currentSong && String(currentSong.SongID) === String(editingSongId)) {
                const updatedSong = songs.find(s => String(s.SongID) === String(editingSongId));
                if (updatedSong) {
                    await changeSong(updatedSong); 
                }
            }
        } else {
            alert(result.message || "Error saving song.");
        }
    } catch(e) { 
        alert("Error saving song"); 
    }
    finally { hideLoading(); }
}
