<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Worship Chordbook v0.5</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .chord-line { color: #fbbf24; font-weight: 700; font-family: monospace; }
        .lyric-line { color: #f1f5f9; font-size: 1.15rem; }
        #navDrawer { transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
    </style>
</head>
<body class="bg-[#0f1117] text-gray-100 min-h-screen">

    <div id="navDrawer" class="fixed inset-y-0 left-0 w-72 bg-[#171921] border-r border-gray-800 z-[100] transform -translate-x-full shadow-2xl flex flex-col">
        <div class="p-6 flex-1 overflow-y-auto">
            <h2 class="text-indigo-400 font-bold text-[10px] uppercase tracking-widest mb-6">Library Menu</h2>
            <div class="grid grid-cols-3 gap-2 mb-6">
                <button onclick="setTab('songs')" id="tab-songs" class="text-[9px] font-bold py-2 bg-gray-800 rounded">SONGS</button>
                <button onclick="setTab('setlists')" id="tab-setlists" class="text-[9px] font-bold py-2 hover:bg-gray-800 rounded">SETS</button>
                <button onclick="setTab('favorites')" id="tab-favorites" class="text-[9px] font-bold py-2 hover:bg-gray-800 rounded">FAVS</button>
            </div>
            <input type="text" id="searchInput" oninput="renderList()" placeholder="Search library..." class="w-full bg-gray-900 border border-gray-700 text-white p-3 rounded-lg text-sm mb-6 outline-none focus:border-indigo-500">
            
            <div class="flex items-center justify-between mb-2">
                <div class="text-[9px] text-gray-500 uppercase tracking-widest" id="listHeader">All Songs</div>
                <button onclick="toggleAdmin()" class="text-[9px] text-indigo-400 hover:text-indigo-300 uppercase">Admin</button>
            </div>
            <div id="sideContent" class="space-y-1">Loading...</div>
            <button id="addBtn" onclick="openForm()" class="hidden w-full mt-4 py-2 bg-indigo-600 text-white text-xs font-bold rounded">ADD NEW SONG</button>
        </div>
        <div class="p-6 border-t border-gray-800 bg-[#14161d]">
            <h2 class="text-indigo-400 font-bold text-[9px] uppercase tracking-widest mb-3">Capabilities v0.5</h2>
        </div>
    </div>
    
    <div id="overlay" onclick="toggleNav(false)" class="fixed inset-0 bg-black/50 z-[90] hidden"></div>
    <div id="formModal" class="fixed inset-0 bg-black/80 z-[200] hidden flex items-center justify-center p-4">
        <div class="bg-gray-900 p-6 rounded-2xl w-full max-w-sm border border-gray-800">
            <h3 id="formTitle" class="text-lg font-bold mb-4">Add Song</h3>
            <input type="text" id="fTitle" placeholder="Title" class="w-full bg-gray-800 p-2 rounded mb-2 text-sm">
            <input type="text" id="fArtist" placeholder="Artist" class="w-full bg-gray-800 p-2 rounded mb-2 text-sm">
            <input type="text" id="fKey" placeholder="Key" class="w-full bg-gray-800 p-2 rounded mb-4 text-sm">
            <button onclick="submitForm()" id="submitBtn" class="w-full bg-indigo-600 py-2 rounded font-bold">SAVE</button>
            <button onclick="closeForm()" class="w-full mt-2 text-gray-500 text-xs">Cancel</button>
        </div>
    </div>

    <header class="sticky top-0 bg-[#0f1117]/90 backdrop-blur-md border-b border-gray-800 p-4 z-50 flex items-center gap-4">
        <button onclick="toggleNav(true)" class="p-2 hover:bg-gray-800 rounded-lg">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path></svg>
        </button>
        <div class="flex flex-col">
            <h1 id="pageTitle" class="text-lg font-bold truncate">Chordbook</h1>
        </div>
    </header>

    <main id="appView" class="max-w-xl mx-auto p-5 pb-32">
        <div class="text-center mt-20 text-gray-500">Select a song or setlist to begin.</div>
    </main>

    <script>
        const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbywWSLvZgnf1eBR5Uf0vWV24bmDTLr7p3LD0RdzI9qAozL4n2yqUWxHhAWzlaMOFfhU/exec';
        const SECRET = 'YOUR_SECRET_KEY';
        let songs = [], setlists = [], favorites = JSON.parse(localStorage.getItem('favs') || '[]');
        let currentTab = 'songs', isAdmin = false, currentSong = null;

        async function fetchTab(tabName) { try { const response = await fetch(`${SCRIPT_URL}?tab=${tabName}`); return await response.json(); } catch (e) { return []; } }
        async function initApp() { [songs, setlists] = await Promise.all([fetchTab('Songs'), fetchTab('Setlists')]); renderList(); }
        
        function setTab(tab) { 
            currentTab = tab; 
            document.querySelectorAll('.grid button').forEach(b => b.classList.replace('bg-gray-800', 'hover:bg-gray-800')); 
            document.getElementById(`tab-${tab}`).classList.replace('hover:bg-gray-800', 'bg-gray-800'); 
            renderList(); 
        }

        function toggleAdmin() { 
            isAdmin = !isAdmin; 
            document.getElementById('addBtn').classList.toggle('hidden', !isAdmin);
            renderList(); 
        }

        function renderList() {
            const container = document.getElementById('sideContent');
            const query = document.getElementById('searchInput').value.toLowerCase();
            container.innerHTML = '';
            let filtered = currentTab === 'songs' ? songs : currentTab === 'favorites' ? songs.filter(s => favorites.includes(String(s.SongID))) : setlists;
            filtered.filter(s => s.Title.toLowerCase().includes(query)).forEach(s => {
                const div = document.createElement('div');
                div.className = "flex items-center justify-between hover:bg-gray-800 rounded-lg";
                div.innerHTML = `
                    <button class="flex-1 text-left p-3 text-sm text-gray-300" onclick="changeSong(${JSON.stringify(s).replace(/"/g, '&quot;')})">${s.Title}</button>
                    ${isAdmin ? `<button onclick="deleteSong(${s.SongID})" class="px-3 text-red-500 text-xs font-bold">X</button>` : ''}
                `;
                container.appendChild(div);
            });
        }

        async function deleteSong(id) {
            if(!confirm('Are you sure?')) return;
            await fetch(SCRIPT_URL, { 
                method: 'POST', 
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ action: 'delete', tab: 'Songs', id: id, secret: SECRET }) 
            });
            songs = songs.filter(s => s.SongID !== id);
            renderList();
        }

        function toggleFav(id) {
            id = String(id);
            if (favorites.includes(id)) favorites = favorites.filter(f => f !== id);
            else favorites.push(id);
            localStorage.setItem('favs', JSON.stringify(favorites));
            changeSong(currentSong);
        }

        function openForm(song) {
            currentSong = song || null;
            document.getElementById('formTitle').innerText = song ? 'Edit Song' : 'Add Song';
            document.getElementById('fTitle').value = song ? song.Title : '';
            document.getElementById('fArtist').value = song ? song.Artist : '';
            document.getElementById('fKey').value = song ? song.OriginalKey : '';
            document.getElementById('formModal').classList.remove('hidden');
        }

        function closeForm() { document.getElementById('formModal').classList.add('hidden'); }

        async function submitForm() {
            const btn = document.getElementById('submitBtn');
            btn.innerText = 'SAVING...';
            const action = currentSong ? 'edit' : 'add';
            const values = [currentSong ? currentSong.SongID : Date.now(), document.getElementById('fTitle').value, document.getElementById('fArtist').value, document.getElementById('fKey').value];
            try {
                const response = await fetch(SCRIPT_URL, { 
                    method: 'POST', 
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ action, tab: 'Songs', id: values[0], values, secret: SECRET }) 
                });
                const result = await response.json();
                btn.innerText = 'SAVE';
                closeForm();
                initApp();
            } catch (err) {
                console.error(err);
                btn.innerText = 'SAVE';
                alert('Submission failed. Check Console.');
            }
        }

        function toggleNav(show) { document.getElementById('navDrawer').classList.toggle('-translate-x-full', !show); document.getElementById('overlay').classList.toggle('hidden', !show); }
        
        async function changeSong(song) {
            currentSong = song;
            document.getElementById('pageTitle').innerText = song.Title;
            const allLines = await fetchTab('SongLines');
            const songLines = allLines.filter(line => line.SongID == song.SongID);
            const isFav = favorites.includes(String(song.SongID));
            document.getElementById('appView').innerHTML = `
                <div class="p-6 bg-gray-900 rounded-2xl border border-gray-800">
                    <h2 class="text-3xl font-bold mb-2">${song.Title}</h2>
                    <div class="flex flex-wrap gap-2 mb-6 text-sm text-indigo-300">
                        ${song.Artist ? `<span class="bg-gray-800 px-3 py-1 rounded-full">${song.Artist}</span>` : ''}
                        ${song.OriginalKey ? `<span class="bg-gray-800 px-3 py-1 rounded-full">Key: ${song.OriginalKey}</span>` : ''}
                        <button onclick="toggleFav(${song.SongID})" class="${isFav ? 'bg-indigo-600' : 'bg-gray-800'} px-3 py-1 rounded-full text-xs transition-colors">Fav</button>
                        ${isAdmin ? `<button onclick="openForm(currentSong)" class="bg-gray-800 px-3 py-1 rounded-full text-xs">Edit</button>` : ''}
                    </div>
                    ${songLines.map(l => `<div class="mb-4"><div class="chord-line">${l.Chords || ''}</div><div class="lyric-line">${l.Lyrics || ''}</div></div>`).join('')}
                </div>
            `;
            toggleNav(false);
        }

        window.onload = initApp;
    </script>
</body>
</html>
