<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Worship Chordbook v0.5</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .chord-line { color: #fbbf24; font-weight: 700; font-family: monospace; }
        .lyric-line { color: #f1f5f9; font-size: 1.15rem; }
        #navDrawer { transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
    </style>
</head>
<body class="bg-[#0f1117] text-gray-100">

    <div id="navDrawer" class="fixed inset-y-0 left-0 w-72 bg-[#171921] border-r border-gray-800 z-[100] transform -translate-x-full shadow-2xl flex flex-col">
        <div class="p-6 overflow-y-auto">
            <h2 class="text-indigo-400 font-bold text-[10px] uppercase tracking-widest mb-6">Library</h2>
            <div id="sideContent" class="space-y-1 text-sm">Loading...</div>
        </div>
    </div>
    
    <header class="sticky top-0 bg-[#0f1117]/95 backdrop-blur-md border-b border-gray-800 p-4 z-50 flex items-center gap-4">
        <button onclick="toggleNav(true)" class="p-2.5 hover:bg-gray-800 rounded-lg text-indigo-400 border border-gray-800 text-xs font-bold">MENU</button>
        <h1 id="pageTitle" class="text-base font-bold truncate">Chordbook</h1>
    </header>

    <main id="appView" class="max-w-xl mx-auto p-5">
        <div class="text-center mt-20 text-gray-500">Select a song from the Menu to begin.</div>
    </main>

    <script>
        const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbywWSLvZgnf1eBR5Uf0vWV24bmDTLr7p3LD0RdzI9qAozL4n2yqUWxHhAWzlaMOFfhU/exec';
        let songs = [];

        async function fetchTab(tabName) { 
            try { 
                const res = await fetch(`${SCRIPT_URL}?tab=${tabName}`); 
                return await res.json(); 
            } catch(e) { console.error(e); return []; } 
        }

        async function initApp() { 
            songs = await fetchTab('Songs');
            const container = document.getElementById('sideContent');
            container.innerHTML = songs.map(s => 
                `<button class="block w-full text-left p-3 hover:bg-gray-800 rounded" onclick='changeSong(${JSON.stringify(s)})'>${s.Title}</button>`
            ).join('');
        }

        async function changeSong(song) {
            document.getElementById('pageTitle').innerText = song.Title;
            toggleNav(false);
            const appView = document.getElementById('appView');
            appView.innerHTML = `<div class="text-center mt-20 text-gray-500 animate-pulse">Loading ${song.Title}...</div>`;

            const allLines = await fetchTab('SongLines');
            const songLines = allLines.filter(line => line.SongID == song.SongID);
            
            appView.innerHTML = `
                <div class="p-6 bg-gray-900 rounded-2xl border border-gray-800">
                    <h2 class="text-2xl font-bold mb-6">${song.Title}</h2>
                    <div class="space-y-4">
                        ${songLines.length > 0 ? songLines.map(l => `
                            <div>
                                <div class="chord-line">${l.Chords || ''}</div>
                                <div class="lyric-line">${l.Lyrics || ''}</div>
                            </div>
                        `).join('') : '<div class="text-gray-600 italic">No lyrics/chords found.</div>'}
                    </div>
                </div>
            `;
        }

        function toggleNav(show) { document.getElementById('navDrawer').classList.toggle('-translate-x-full', !show); }
        window.onload = initApp;
    </script>
</body>
</html>
