<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Worship Chordbook - Version Awesome-1</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .chord-line { color: #fbbf24; font-weight: 700; font-family: monospace; }
        .lyric-line { color: #f1f5f9; font-size: 1.15rem; }
        #navDrawer { transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
    </style>
</head>
<body class="bg-[#0f1117] text-gray-100 min-h-screen flex">

    <!-- Sidebar -->
    <div id="sidebar" class="w-64 bg-gray-900 h-screen p-4 border-r border-gray-800 overflow-y-auto">
        <h1 class="text-xl font-bold mb-6">Chordbook</h1>
        <div id="songList">
            <!-- Your song list items populated by JS -->
            <p class="text-sm text-gray-500">Loading songs...</p>
        </div>
    </div>

    <!-- Add Line Modal -->
    <div id="lineModal" class="fixed inset-0 bg-black/80 z-[200] hidden flex items-center justify-center p-4">
        <div class="bg-[#171921] p-6 rounded-2xl w-full max-w-md border border-gray-800">
            <h3 class="text-xl font-bold mb-4">Add Song Line</h3>
            <div class="space-y-3">
                <input type="text" id="secName" placeholder="Section (e.g. Chorus)" class="w-full bg-gray-900 p-3 rounded border border-gray-700">
                <input type="text" id="chords" placeholder="Chords (e.g. C G Am F)" class="w-full bg-gray-900 p-3 rounded border border-gray-700">
                <input type="text" id="lyrics" placeholder="Lyrics" class="w-full bg-gray-900 p-3 rounded border border-gray-700">
                <select id="type" class="w-full bg-gray-900 p-3 rounded border border-gray-700">
                    <option value="Lyric">Lyric</option>
                    <option value="Instruction">Instruction</option>
                </select>
                <div class="flex gap-2 mt-4">
                    <button onclick="document.getElementById('lineModal').classList.add('hidden')" class="flex-1 py-2 bg-gray-700 rounded">Cancel</button>
                    <button onclick="saveLine()" class="flex-1 py-2 bg-indigo-600 rounded">Save Line</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Main View -->
    <div id="appView" class="flex-1 p-6 overflow-y-auto">
        <div class="text-center mt-20 text-gray-500">Please select a song from the sidebar.</div>
    </div>

    <script>
        const SCRIPT_URL = 'YOUR_GOOGLE_SCRIPT_URL_HERE';
        let currentSong = null;
        let allLines = [];

        window.onload = async () => {
            // Load your songs list here to populate the sidebar
            try {
                const response = await fetch(SCRIPT_URL + '?tab=Songs');
                const songs = await response.json();
                const songList = document.getElementById('songList');
                songList.innerHTML = songs.map(s => `
                    <div onclick='changeSong(${JSON.stringify(s)})' class="cursor-pointer p-2 hover:bg-gray-800 rounded mb-1">
                        ${s.Title}
                    </div>
                `).join('');
            } catch (err) {
                console.error("Error loading songs:", err);
            }
        };

        async function changeSong(song) {
            currentSong = song;
            try {
                const response = await fetch(SCRIPT_URL + '?tab=SongLines');
                allLines = await response.json();

                const songLines = allLines.filter(l => l.SongID == song.SongID).sort((a,b) => a.LineOrder - b.LineOrder);
                const sections = {};
                songLines.forEach(l => {
                    if(!sections[l.SectionName]) sections[l.SectionName] = [];
                    sections[l.SectionName].push(l);
                });

                document.getElementById('appView').innerHTML = `
                    <div class="flex justify-between items-center mb-6">
                        <h2 class="text-3xl font-bold">${song.Title}</h2>
                        <button onclick="document.getElementById('lineModal').classList.remove('hidden')" class="px-4 py-2 bg-green-600 text-sm font-bold rounded">+ Add Line</button>
                    </div>
                    ${Object.keys(sections).map(sec => `
                        <div class="mb-6">
                            <h4 class="text-[10px] font-bold text-indigo-500 uppercase tracking-widest border-b border-gray-800 pb-1 mb-2">${sec}</h4>
                            ${sections[sec].map(l => `
                                <div class="mb-1 ${l.Type === 'Instruction' ? 'italic text-gray-500' : ''}">
                                    <div class="chord-line text-amber-500 font-mono text-sm">${l.Chords || '&nbsp;'}</div>
                                    <div class="lyric-line text-gray-200 text-base">${l.Lyrics || ''}</div>
                                </div>
                            `).join('')}
                        </div>
                    `).join('')}
                `;
            } catch (err) {
                console.error("Error loading song:", err);
            }
        }

        async function saveLine() {
            if (!currentSong) return;
            const secName = document.getElementById('secName').value;
            const sectionLines = allLines.filter(l => l.SongID == currentSong.SongID && l.SectionName == secName);
            const nextOrder = sectionLines.length > 0 ? Math.max(...sectionLines.map(l => Number(l.LineOrder))) + 1 : 1;

            const payload = {
                action: 'add',
                tab: 'SongLines',
                secret: 'YOUR_SECRET_KEY',
                values: JSON.stringify([
                    currentSong.SongID, 
                    secName, 
                    nextOrder, 
                    document.getElementById('type').value, 
                    document.getElementById('chords').value, 
                    document.getElementById('lyrics').value
                ])
            };

            await fetch(SCRIPT_URL, { method: 'POST', body: JSON.stringify(payload) });
            document.getElementById('lineModal').classList.add('hidden');
            changeSong(currentSong);
        }
    </script>
</body>
</html>
