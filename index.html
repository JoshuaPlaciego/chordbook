<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Worship Chordbook v0.5</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .chord-line { color: #fbbf24; font-weight: 700; font-family: monospace; }
        .lyric-line { color: #f1f5f9; font-size: 1.15rem; }
        #navDrawer { transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .modal-transition { transition: opacity 0.25s ease, transform 0.25s ease; }
    </style>
</head>
<body class="bg-[#0f1117] text-gray-100 min-h-screen selection:bg-indigo-500/30 selection:text-white">

    <!-- Sidebar Menu Drawer -->
    <div id="navDrawer" class="fixed inset-y-0 left-0 w-72 bg-[#171921] border-r border-gray-800 z-[100] transform -translate-x-full shadow-2xl flex flex-col">
        <div class="p-6 flex-1 overflow-y-auto">
            <h2 class="text-indigo-400 font-bold text-[10px] uppercase tracking-widest mb-6">Library Menu</h2>
            <div class="grid grid-cols-3 gap-2 mb-6">
                <button onclick="setTab('songs')" id="tab-songs" class="text-[9px] font-bold py-2 bg-gray-800 rounded transition-colors duration-150">SONGS</button>
                <button onclick="setTab('setlists')" id="tab-setlists" class="text-[9px] font-bold py-2 hover:bg-gray-800 rounded transition-colors duration-150">SETS</button>
                <button onclick="setTab('favorites')" id="tab-favorites" class="text-[9px] font-bold py-2 hover:bg-gray-800 rounded transition-colors duration-150">FAVS</button>
            </div>
            <input type="text" id="searchInput" oninput="renderList()" placeholder="Search library..." class="w-full bg-gray-900 border border-gray-700 text-white p-3 rounded-lg text-sm mb-6 outline-none focus:border-indigo-500 transition-colors">
            
            <div class="flex items-center justify-between mb-2">
                <div class="text-[9px] text-gray-500 uppercase tracking-widest" id="listHeader">All Songs</div>
                <button onclick="toggleAdmin()" class="text-[9px] text-indigo-400 hover:text-indigo-300 uppercase font-bold tracking-wider transition-colors">Admin</button>
            </div>
            <div id="sideContent" class="space-y-1">Loading...</div>
            <button id="addBtn" onclick="openForm()" class="hidden w-full mt-4 py-2 bg-indigo-600 hover:bg-indigo-700 text-white text-xs font-bold rounded shadow-lg shadow-indigo-600/20 transition-all">ADD NEW SONG</button>
        </div>
        <div class="p-6 border-t border-gray-800 bg-[#14161d]">
            <h2 class="text-indigo-400 font-bold text-[9px] uppercase tracking-widest mb-3">Capabilities v0.5</h2>
            <ul class="text-[10px] text-gray-500 space-y-1.5 font-mono">
                <li>• Live Library Sync</li><li>• Real-time Search</li><li>• Private Favorites</li><li>• Setlist Integration</li><li>• Admin CRUD (v0.5)</li>
            </ul>
        </div>
    </div>
    
    <!-- Interaction Overlay -->
    <div id="overlay" onclick="toggleNav(false)" class="fixed inset-0 bg-black/60 z-[90] hidden transition-opacity duration-300"></div>
    
    <!-- Add/Edit Song Modal -->
    <div id="formModal" class="fixed inset-0 bg-black/80 z-[200] hidden flex items-center justify-center p-4 modal-transition opacity-0">
        <div class="bg-gray-900 p-6 rounded-2xl w-full max-w-sm border border-gray-800 shadow-2xl transform scale-95 transition-transform duration-300" id="formModalContainer">
            <h3 id="formTitle" class="text-lg font-bold mb-4 text-white">Add Song</h3>
            <div class="space-y-3 mb-6">
                <div>
                    <label class="block text-[10px] text-gray-400 uppercase tracking-wider mb-1 font-semibold">Song Title</label>
                    <input type="text" id="fTitle" placeholder="e.g. Way Maker" class="w-full bg-gray-800 p-3 rounded-lg text-sm text-white border border-gray-700 focus:border-indigo-500 outline-none transition-colors">
                </div>
                <div>
                    <label class="block text-[10px] text-gray-400 uppercase tracking-wider mb-1 font-semibold">Artist / Author</label>
                    <input type="text" id="fArtist" placeholder="e.g. Sinach" class="w-full bg-gray-800 p-3 rounded-lg text-sm text-white border border-gray-700 focus:border-indigo-500 outline-none transition-colors">
                </div>
                <div>
                    <label class="block text-[10px] text-gray-400 uppercase tracking-wider mb-1 font-semibold">Original Key</label>
                    <input type="text" id="fKey" placeholder="e.g. C, G, Am" class="w-full bg-gray-800 p-3 rounded-lg text-sm text-white border border-gray-700 focus:border-indigo-500 outline-none transition-colors">
                </div>
            </div>
            <button id="submitBtn" onclick="submitForm()" class="w-full bg-indigo-600 py-3 rounded-xl font-bold hover:bg-indigo-700 transition-colors shadow-lg shadow-indigo-600/10">SAVE</button>
            <button onclick="closeForm()" class="w-full mt-3 text-gray-400 text-xs hover:text-gray-200 transition-colors py-1">Cancel</button>
        </div>
    </div>

    <!-- Custom Confirmation Modal -->
    <div id="confirmModal" class="fixed inset-0 bg-black/85 z-[210] hidden flex items-center justify-center p-4 modal-transition opacity-0">
        <div class="bg-gray-900 p-6 rounded-2xl w-full max-w-xs border border-red-900/30 shadow-2xl text-center transform scale-95 transition-transform duration-300" id="confirmModalContainer">
            <h3 class="text-md font-bold mb-2 text-white">Delete Permanently?</h3>
            <p class="text-xs text-gray-400 mb-6" id="confirmMessage">Are you sure you want to delete this song?</p>
            <div class="flex gap-2">
                <button onclick="closeConfirmModal()" class="flex-1 bg-gray-800 hover:bg-gray-700 text-gray-300 py-2.5 rounded-lg text-xs font-semibold transition-colors">Cancel</button>
                <button id="confirmDeleteBtn" class="flex-1 bg-red-600 hover:bg-red-700 text-white py-2.5 rounded-lg text-xs font-semibold transition-colors">Delete</button>
            </div>
        </div>
    </div>

    <div id="toastContainer" class="fixed bottom-4 right-4 z-[220] flex flex-col gap-2 max-w-sm pointer-events-none"></div>

    <header class="sticky top-0 bg-[#0f1117]/95 backdrop-blur-md border-b border-gray-800 p-4 z-50 flex items-center gap-4">
        <button onclick="toggleNav(true)" class="p-2.5 hover:bg-gray-800/80 rounded-lg text-indigo-400 flex items-center gap-2 font-bold text-xs tracking-wider border border-gray-800">MENU</button>
        <div class="flex flex-col min-w-0">
            <h1 id="pageTitle" class="text-base font-bold truncate text-gray-100">Chordbook</h1>
        </div>
    </header>

    <main id="appView" class="max-w-xl mx-auto p-5 pb-32">
        <div class="text-center mt-20 text-gray-500">Loading your library...</div>
    </main>

    <script>
        const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbyXCeXackc_suAUMKCGJ6qIjMygAADB9zHmoJ5EqWU_OTmBxkgH9uHLP4nY427farS5/exec';
        const SECRET = 'YOUR_SECRET_KEY';
        let songs = [], favorites = JSON.parse(localStorage.getItem('favs') || '[]');
        let currentTab = 'songs', isAdmin = false, currentSong = null;

        function showToast(message, type = 'info') {
            const container = document.getElementById('toastContainer');
            const toast = document.createElement('div');
            toast.className = `p-4 rounded-xl text-xs font-semibold shadow-2xl flex items-center gap-3 border pointer-events-auto transform transition-all duration-300 ${type === 'success' ? 'bg-green-900/20 text-green-400' : 'bg-indigo-900/20 text-indigo-400'}`;
            toast.innerHTML = `<span>${message}</span>`;
            container.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }

        async function initApp() { 
            const res = await fetch(`${SCRIPT_URL}?tab=Songs`); 
            songs = await res.json(); 
            renderList();
        }

        function renderList() {
            const container = document.getElementById('sideContent');
            container.innerHTML = '';
            songs.forEach(s => {
                const div = document.createElement('div');
                div.className = "flex items-center justify-between hover:bg-gray-800 rounded-lg group";
                div.innerHTML = `<button class="p-3 text-sm text-gray-300" onclick='changeSong(${JSON.stringify(s)})'>${s.Title}</button>`;
                container.appendChild(div);
            });
        }

        function openForm(song) {
            currentSong = song || null;
            document.getElementById('formTitle').innerText = song ? 'Edit Song' : 'Add New Song';
            document.getElementById('fTitle').value = song ? song.Title : '';
            document.getElementById('fArtist').value = song ? (song.Artist || '') : '';
            document.getElementById('fKey').value = song ? (song.OriginalKey || '') : '';
            document.getElementById('formModal').classList.remove('hidden');
            setTimeout(() => document.getElementById('formModal').classList.remove('opacity-0'), 10);
        }

        function closeForm() {
            document.getElementById('formModal').classList.add('opacity-0');
            setTimeout(() => document.getElementById('formModal').classList.add('hidden'), 250);
        }

        async function submitForm() {
            const id = currentSong ? currentSong.SongID : Date.now();
            const action = currentSong ? 'edit' : 'add';
            const values = [id, document.getElementById('fTitle').value, document.getElementById('fArtist').value, document.getElementById('fKey').value];
            
            await fetch(SCRIPT_URL, { 
                method: 'POST', 
                body: JSON.stringify({ action, tab: 'Songs', values, id, secret: SECRET }) 
            });
            closeForm();
            await initApp();
            showToast("Saved successfully!", "success");
        }

        function toggleAdmin() { isAdmin = !isAdmin; document.getElementById('addBtn').classList.toggle('hidden', !isAdmin); }
        function toggleNav(show) { document.getElementById('navDrawer').classList.toggle('-translate-x-full', !show); document.getElementById('overlay').classList.toggle('hidden', !show); }
        function changeSong(song) { currentSong = song; document.getElementById('pageTitle').innerText = song.Title; toggleNav(false); }

        window.onload = initApp;
    </script>
</body>
</html>
